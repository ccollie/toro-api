scalar JobRemoveOption

enum JobState {
  completed
  failed
  delayed
  active
  waiting
  paused
}

interface JobRepeatOptions {
  """Timezone"""
  tz: String
  """End date when the repeat job should start repeating (only with cron)."""
  endDate: DateTime
  """Number of times the job should repeat at max."""
  limit: Int

  """The start value for the repeat iteration count"""
  count: Int
  prevMillis: Int
  jobId: String
}

type JobRepeatOptionsCron implements JobRepeatOptions {
  """Cron string"""
  cron: String
  """Timezone"""
  tz: String
  """Start date when the repeat job should start repeating (only with cron)."""
  startDate: DateTime
  """End date when the repeat job should start repeating (only with cron)."""
  endDate: DateTime
  """Number of times the job should repeat at max."""
  limit: Int
  """The start value for the repeat iteration count"""
  count: Int
  prevMillis: Int
  jobId: String
}

type JobRepeatOptionsEvery implements JobRepeatOptions {
  """Timezone"""
  tz: String
  """End date when the repeat job should start repeating (only with cron)."""
  endDate: DateTime
  """Number of times the job should repeat at max."""
  limit: Int
  """ Repeat every millis (cron setting cannot be used together with this setting.)"""
  every: Int
  """The start value for the repeat iteration count"""
  count: Int
  prevMillis: Int
  jobId: String
}

