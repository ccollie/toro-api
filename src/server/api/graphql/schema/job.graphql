type AddJobPayload {
  job: Job
  queue: Queue
}

type AddBulkJobsPayload {
  jobs: [Job]
  queue: Queue
}

type JobAddCronPayload {
  job: Job
  queue: Queue
}

input JobAddBulkInput {
  name: String!
  data: JSON!
  options: JobOptionsInput
}

type JobLogs {
  count: Int
  items: [String]
}


type Job {
  id: ID!
  queueId: ID!
  name: String
  state: JobState
  opts: JobOptions
  """User defined job data"""
  data: JSON
  delay: Int
  progress: JobProgress
  """The total number of attempts made to this point."""
  attemptsMade: Int
  """The timestamp of when the job was finished (completed or failed)"""
  finishedOn: DateTime
  processedOn: DateTime
  timestamp: DateTime!
  failedReason: String
  stacktrace: [String]
  returnvalue: JSON
  logs(start: Int = 0, end: Int = -1): JobLogs!
}

extend type Query {
  job(queueId: ID!, id: ID!): Job
}

type BulkStatusItem {
  id: ID!
  success: Boolean
  reason: String
}

type DeleteBulkJobsPayload {
  status: [BulkStatusItem!]!
  queue: Queue
}

type RetryBulkJobsPayload {
  status: [BulkStatusItem!]!
  queue: Queue
}

type PromoteBulkJobsPayload {
  status: [BulkStatusItem!]!
  queue: Queue
}

input AddJobInput {
  queueId: ID!,
  jobName: String!
  data: JSON!
  options: JobOptionsInput
}

type AddJobLogPayload {
  id: ID!
  count: Int!
  job: Job
}

type RetryJobPayload {
  job: Job
  queue: Queue
}

type PromoteJobPayload {
  job: Job
  queue: Queue
}

type UpdateJobPayload {
  job: Job
  queue: Queue
}

type DeleteJobPayload {
  id: ID!
  queue: Queue
}

extend type Mutation {
  addJob(input: AddJobInput): AddJobPayload
  addBulkJobs(queueId: ID!, jobs: [JobOptionsInput]): AddBulkJobsPayload
  addRepeatableCronJob(
    queueId: ID!,
    jobName: String!
    data: JSON!
    options: JobOptionsCronInput
  ): AddJobPayload
  addRepeatableEveryJob(
    queueId: ID!,
    jobName: String!
    data: JSON!
    options: JobOptionsEveryInput
  ): AddJobPayload
  promoteJob(queueId: ID!, jobId: ID!): PromoteJobPayload
  retryJob(queueId: ID!, jobId: ID!): RetryJobPayload
  deleteJob(queueId: ID!, jobId: ID!): DeleteQueuePayload
  updateJob(queueId: ID!, jobId: ID!, data: JSONObject): UpdateJobPayload
  deleteBulkJobs(queueId: ID!, jobIds: [ID!]!): DeleteBulkJobsPayload
  retryBulkJobs(queueId: ID!, jobIds: [ID!]!): RetryBulkJobsPayload
  promoteBulkJobs(queueId: ID!, jobIds: [ID!]!): PromoteBulkJobsPayload
  moveJobToDelayed(queueId: ID!, jobId: ID!): Job
  moveJobToCompleted(queueId: ID!, jobId: ID!): Job
  addJobLog(
    queueId: ID!,
    jobId: ID!
    row: String!
  ): AddJobLogPayload
}

type JobCreatedMessage {
  job: Job!
}

type JobUpdatedMessage {
  """Event name indication what changed"""
  event: String!
  """Job delta"""
  delta: JSONObject
}

type JobDeletedMessage {
  jobId: ID!
}

type JobPromotedMessage {
  job: Job!
}

"""Subscription message for added job log"""
type JobLogAddedMessage {
  """the added log items"""
  rows: [String!]!
  """the number of log items after the addition"""
  count: Int
}

extend type Subscription {
  jobCreated(queueId: ID!): JobCreatedMessage
  jobUpdated(queueId: ID!, jobId: ID!): JobUpdatedMessage
  jobDeleted(queueId: ID!, jobId: ID!): JobDeletedMessage
  jobPromoted(queueId: ID!, jobId: ID!): JobPromotedMessage
  jobLogAdded(queueId: ID!, jobId: ID!): JobLogAddedMessage
  # todo: onJobFinished ( failed or completed )
}
